name: Build Signed APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Write signing.properties
        run: |
          cat > signing.properties <<EOF
          keystore=${{ github.workspace }}/keystore.jks
          keystore.password=${{ secrets.KEYSTORE_PASSWORD }}
          keystore.alias=${{ secrets.KEY_ALIAS }}
          EOF

      - name: Build signed release APK
        run: ./gradlew assembleConversationsFreeRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: impulse-release
          path: build/outputs/apk/conversationsFree/release/*arm64-v8a*.apk
          retention-days: 14

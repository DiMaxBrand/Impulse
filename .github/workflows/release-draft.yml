name: Draft Release

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name without build meta (e.g. 1.11.0-alpha.16)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Write signing.properties
        run: |
          cat > signing.properties <<EOF
          keystore=${{ github.workspace }}/keystore.jks
          keystore.password=${{ secrets.KEYSTORE_PASSWORD }}
          keystore.alias=${{ secrets.KEY_ALIAS }}
          EOF

      - name: Build signed release APK
        run: >
          ./gradlew assembleConversationsFreeRelease
          -PversionName="${{ inputs.version_name }}+2.20.0"

      - name: Create and push git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ inputs.version_name }}"
          git push origin "${{ inputs.version_name }}"

      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "${{ inputs.version_name }}" \
            --draft \
            $PRERELEASE_FLAG \
            --title "Impulse ${{ inputs.version_name }}" \
            --generate-notes \
            "build/outputs/apk/conversationsFree/release/"*arm64-v8a*.apk
